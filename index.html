<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Happy 25th, Maheen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181F;
    --navy:#1C2A40;
    --parchment:#EFE1C4;
    --parchment-light:#F8F1DF;
    --gold:#C79A2A;
    --gold-bright:#E6C664;
    --burgundy:#6E1F2A;
    --burgundy-light:#8C2C39;
    --ivory:#FBF6EA;
    --charcoal:#241D18;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    font-family:'Lora', Georgia, serif;
    background:var(--ink);
    color:var(--ivory);
    overflow:hidden;
  }
  #stage{ position:fixed; inset:0; overflow:hidden; }
  canvas#fx-canvas{ position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; }

  .scene{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2rem 1.25rem;
    overflow:hidden;
  }
  .scene[hidden]{ display:none; }
  #scene-cover, #scene-cake, #scene-bday{
    background: radial-gradient(circle at 50% 30%, var(--navy), var(--ink) 75%);
  }
  #scene-letter, #scene-final{
    background: radial-gradient(circle at 50% 12%, var(--parchment-light), var(--parchment) 78%);
    color:var(--charcoal);
  }

  .eyebrow{
    font-family:'Playfair Display', serif; font-style:italic;
    letter-spacing:.12em; text-transform:uppercase;
    font-size:clamp(.7rem,2.6vw,.85rem); color:var(--gold-bright); margin:0 0 .7rem;
  }
  .cover-name{
    font-family:'Playfair Display', serif; font-weight:600;
    font-size:clamp(1.5rem,6.5vw,2.4rem); margin:0 0 2rem; color:var(--ivory);
  }
  .countdown{ line-height:1; }
  #countdown-num{
    font-family:'Playfair Display', serif; font-weight:700;
    font-size:clamp(4.5rem,24vw,7.5rem); color:var(--gold-bright); display:inline-block;
  }
  .cover-hint{
    margin-top:1.8rem; font-style:italic; color:rgba(251,246,234,.62);
    font-size:clamp(.8rem,3vw,.95rem);
  }

  .divider{ display:flex; align-items:center; gap:.6rem; justify-content:center; color:var(--gold); margin:.4rem 0 1.2rem; width:100%; max-width:280px; position:relative; z-index:2; }
  .divider::before, .divider::after{ content:''; flex:1; height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent); }

  /* --- cake --- */
  .cake-wrap{ display:flex; flex-direction:column; align-items:center; gap:1.6rem; }
  .cake{ position:relative; width:min(64vw,240px); height:230px; }
  .layer{
    position:absolute; left:50%; transform:translateX(-50%) translateY(24px) scale(.92);
    opacity:0; border-radius:14px 14px 6px 6px;
    transition:opacity .6s ease, transform .6s cubic-bezier(.34,1.56,.64,1);
    box-shadow:0 8px 16px rgba(0,0,0,.35);
  }
  .layer.show{ opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
  .layer--base{ bottom:0; width:100%; height:92px; background:linear-gradient(180deg,var(--burgundy-light),var(--burgundy)); }
  .layer--mid{ bottom:80px; width:76%; height:70px; background:linear-gradient(180deg,var(--gold-bright),var(--gold)); }
  .layer--top{ bottom:138px; width:54%; height:56px; border-radius:10px; background:linear-gradient(180deg,var(--ivory),#E9E0CB); }
  .candle{
    position:absolute; bottom:190px; width:6px; height:32px; border-radius:3px;
    background:linear-gradient(180deg,#F3D98B,var(--gold));
    opacity:0; transform:translateY(10px);
    transition:opacity .5s ease, transform .5s ease;
  }
  .candle.show{ opacity:1; transform:translateY(0); }
  .candle--1{ left:36%; } .candle--2{ left:50%; margin-left:-3px; } .candle--3{ left:64%; margin-left:-6px; }
  .flame{
    position:absolute; top:-15px; left:50%; transform:translateX(-50%);
    width:10px; height:15px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    background:radial-gradient(circle at 50% 30%, #fff6dc, var(--gold-bright) 55%, transparent 75%);
    opacity:0;
  }
  .flame.show{ opacity:1; animation:flicker 1s ease-in-out infinite alternate; }
  @keyframes flicker{
    0%{ transform:translateX(-50%) scale(1) rotate(-2deg); }
    50%{ transform:translateX(-50%) scale(1.08) rotate(1deg); }
    100%{ transform:translateX(-50%) scale(.94) rotate(3deg); }
  }
  .scene-caption{ font-style:italic; color:rgba(251,246,234,.65); font-size:clamp(.85rem,3vw,1rem); }

  /* --- balloons / fireworks --- */
  .balloons{ position:absolute; inset:0; overflow:hidden; z-index:1; }
  .balloon{
    position:absolute; bottom:-130px; width:56px; height:72px;
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    opacity:0; animation:floatUp 5s ease-in forwards;
  }
  .balloon::after{
    content:''; position:absolute; left:50%; bottom:-24px; width:2px; height:24px;
    background:rgba(255,255,255,.35); transform:translateX(-50%);
  }
  @keyframes floatUp{
    0%{ opacity:0; transform:translateY(0) translateX(0); }
    8%{ opacity:1; }
    55%{ transform:translateY(-58vh) translateX(12px); }
    100%{ opacity:0; transform:translateY(-118vh) translateX(-8px); }
  }

  /* --- happy birthday title scene --- */
  .big-title{
    font-family:'Playfair Display', serif; font-weight:700; text-transform:uppercase;
    font-size:clamp(1.7rem,8.4vw,3.4rem); margin:0 0 .4rem; line-height:1.25;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    position:relative; z-index:2; max-width:90vw;
  }
  .letter-span{ display:inline-block; opacity:0; transform:translateY(20px); animation:letterIn .55s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes letterIn{ to{ opacity:1; transform:translateY(0); } }

  /* --- modal --- */
  .modal-backdrop{
    position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;
    background:rgba(10,14,20,.72); backdrop-filter:blur(3px); padding:1.5rem;
  }
  .modal-backdrop[hidden]{ display:none; }
  .modal-card{
    background:var(--parchment-light); color:var(--charcoal); border-radius:18px;
    padding:2.1rem 1.8rem; max-width:360px; text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,.4); border:1px solid rgba(0,0,0,.06);
  }
  .modal-eyebrow{
    font-family:'Playfair Display', serif; font-style:italic; color:var(--burgundy);
    letter-spacing:.08em; text-transform:uppercase; font-size:.72rem; margin:0 0 .6rem;
  }
  .modal-question{ font-family:'Playfair Display', serif; font-size:clamp(1.2rem,5vw,1.5rem); margin:0 0 1.5rem; line-height:1.35; }
  .modal-actions{ display:flex; gap:.8rem; justify-content:center; flex-wrap:wrap; }
  .btn{
    font-family:'Lora', serif; font-size:1rem; padding:.7rem 1.5rem; border-radius:999px;
    border:1.5px solid var(--burgundy); cursor:pointer; background:transparent; color:var(--burgundy);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .btn--primary{ background:var(--burgundy); color:var(--ivory); }
  .btn:hover, .btn:focus-visible{ transform:translateY(-2px); box-shadow:0 8px 18px rgba(110,31,42,.3); }
  .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* --- book / letter pages --- */
  #scene-letter{ padding:1.2rem 1rem; }
  .book-wrap{ width:100%; max-width:560px; margin:0 auto; }
  .book{ perspective:1400px; }
  .book-page{
    background:var(--ivory); color:var(--charcoal);
    border-radius:3px 12px 12px 3px;
    padding:2rem 1.5rem 1.4rem;
    min-height:58vh; max-height:76vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    box-shadow:0 24px 55px rgba(0,0,0,.28), inset -10px 0 24px -18px rgba(0,0,0,.35);
    position:relative;
    transition:transform .42s ease, opacity .42s ease;
    text-align:left;
  }
  .flip-out{ transform:rotateY(-95deg); opacity:0; }
  .flip-in{ transform:rotateY(95deg) !important; opacity:0 !important; transition:none !important; }
  .running-head{
    font-family:'Playfair Display', serif; font-style:italic; font-size:.7rem;
    letter-spacing:.1em; text-transform:uppercase; color:var(--gold); text-align:center;
    margin:0 0 1rem; opacity:.85;
  }
  .page-heading{
    font-family:'Playfair Display', serif; font-size:clamp(1.15rem,4.8vw,1.45rem);
    color:var(--burgundy); text-align:center; margin:0 0 1.3rem;
  }
  .book-para{ font-size:clamp(.96rem,3.3vw,1.06rem); line-height:1.8; margin:0 0 1.05rem; }
  .book-para.has-dropcap::first-letter{
    font-family:'Playfair Display', serif; font-size:2.7em; float:left; line-height:.8;
    padding:.05em .09em 0 0; color:var(--burgundy); font-weight:700;
  }
  .book-signoff{ font-size:1.02rem; margin-top:1.3rem; text-align:right; }
  .script{ font-family:'Great Vibes', cursive; font-size:clamp(1.5rem,6.4vw,2rem); color:var(--burgundy); margin-left:.3rem; }
  .page-footer{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:1.3rem; padding-top:.7rem; border-top:1px solid rgba(0,0,0,.08);
  }
  .page-num{ font-family:'Playfair Display', serif; font-style:italic; font-size:.8rem; color:rgba(36,29,24,.5); }
  .page-nav{
    font-family:'Lora', serif; font-size:.88rem; background:none; border:none; color:var(--burgundy);
    cursor:pointer; text-decoration:underline; text-underline-offset:3px; padding:.3rem;
  }
  .page-nav:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  /* --- final scene --- */
  .final-heading{
    font-family:'Playfair Display', serif; font-style:italic;
    font-size:clamp(1.25rem,5.4vw,1.75rem); color:var(--burgundy); margin:0 0 1.7rem;
    opacity:0; animation:fadeInUp .9s ease forwards;
  }
  .final-photo-frame{
    width:min(70vw,300px); border-radius:14px; overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.3); border:6px solid var(--ivory);
    opacity:0; transform:scale(.92); animation:photoIn 1s ease forwards; animation-delay:.6s;
  }
  .final-photo-frame img{ display:block; width:100%; height:auto; }
  @keyframes photoIn{ to{ opacity:1; transform:scale(1); } }
  .final-caption{
    margin-top:1.7rem; font-family:'Great Vibes', cursive; font-size:clamp(1.5rem,6.6vw,2.1rem);
    color:var(--burgundy); opacity:0; animation:fadeInUp .9s ease forwards; animation-delay:1.4s;
  }
  @keyframes fadeInUp{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="fx-canvas"></canvas>

  <section class="scene" id="scene-cover" data-scene="cover">
    <p class="eyebrow">turning the page to</p>
    <h1 class="cover-name">Maheen&rsquo;s 25th Chapter</h1>
    <div class="countdown"><span id="countdown-num">10</span></div>
    <p class="cover-hint">a story begins in a moment&hellip;</p>
  </section>

  <section class="scene" id="scene-cake" data-scene="cake" hidden>
    <div class="cake-wrap">
      <div class="cake">
        <div class="candle candle--1"><span class="flame"></span></div>
        <div class="candle candle--2"><span class="flame"></span></div>
        <div class="candle candle--3"><span class="flame"></span></div>
        <div class="layer layer--top"></div>
        <div class="layer layer--mid"></div>
        <div class="layer layer--base"></div>
      </div>
      <p class="scene-caption">baking something worth celebrating&hellip;</p>
    </div>
  </section>

  <section class="scene" id="scene-bday" data-scene="bday" hidden>
    <div class="balloons" id="balloons"></div>
    <h1 class="big-title" id="big-title"></h1>
    <div class="divider" aria-hidden="true"></div>
  </section>

  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal-card">
      <p class="modal-eyebrow">a small interruption</p>
      <h2 class="modal-question">Are you ready for your birthday surprise?</h2>
      <div class="modal-actions">
        <button class="btn btn--primary" data-choice="yes">Yes</button>
        <button class="btn btn--ghost" data-choice="absolutely">Absolutely</button>
      </div>
    </div>
  </div>

  <section class="scene" id="scene-letter" data-scene="letter" hidden>
    <div class="book-wrap">
      <div class="book">
        <div class="book-page" id="book-page"></div>
      </div>
    </div>
  </section>

  <section class="scene" id="scene-final" data-scene="final" hidden>
    <p class="final-heading">That&rsquo;s all for this time&hellip;</p>

<script>
(function(){
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var sceneCover = document.getElementById('scene-cover');
  var sceneCake = document.getElementById('scene-cake');
  var sceneBday = document.getElementById('scene-bday');
  var sceneLetter = document.getElementById('scene-letter');
  var sceneFinal = document.getElementById('scene-final');
  var modalBackdrop = document.getElementById('modal-backdrop');

  function crossfade(fromEl, toEl, cb){
    var delay = 0;
    if(fromEl){
      delay = 500;
      fromEl.style.transition = 'opacity .5s ease';
      fromEl.style.opacity = '0';
    }
    setTimeout(function(){
      if(fromEl) fromEl.hidden = true;
      toEl.hidden = false;
      toEl.style.opacity = '0';
      void toEl.offsetWidth;
      toEl.style.transition = 'opacity .6s ease';
      toEl.style.opacity = '1';
      if(cb) cb();
    }, delay);
  }

  /* ---------- countdown ---------- */
  function startCountdown(){
    var el = document.getElementById('countdown-num');
    var count = 10;
    el.textContent = count;
    var timer = setInterval(function(){
      count -= 1;
      if(count > 0){
        el.textContent = count;
        if(!reduceMotion){
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = 'pulse .5s ease';
        }
      } else {
        clearInterval(timer);
        crossfade(sceneCover, sceneCake, buildCake);
      }
    }, 1000);
  }

  /* ---------- cake ---------- */
  function buildCake(){
    var base = document.querySelector('.layer--base');
    var mid = document.querySelector('.layer--mid');
    var top = document.querySelector('.layer--top');
    var candles = document.querySelectorAll('.candle');
    var flames = document.querySelectorAll('.flame');

    setTimeout(function(){ base.classList.add('show'); }, 150);
    setTimeout(function(){ mid.classList.add('show'); }, 750);
    setTimeout(function(){ top.classList.add('show'); }, 1350);
    setTimeout(function(){ candles.forEach(function(c){ c.classList.add('show'); }); }, 1950);
    setTimeout(function(){ flames.forEach(function(f){ f.classList.add('show'); }); }, 2350);
    setTimeout(function(){ crossfade(sceneCake, sceneBday, startBdayScene); }, 4200);
  }

  /* ---------- balloons ---------- */
  var balloonColors = ['#8C2C39', '#C79A2A', '#F8F1DF', '#B2555F'];
  function buildBalloons(){
    var wrap = document.getElementById('balloons');
    wrap.innerHTML = '';
    var count = 10;
    for(var i=0;i<count;i++){
      var b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = (4 + Math.random()*86) + '%';
      b.style.background = 'radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), ' + balloonColors[i % balloonColors.length] + ')';
      b.style.animationDelay = (Math.random()*1.4) + 's';
      wrap.appendChild(b);
    }
  }

  /* ---------- letters-in text reveal (reused for the big title) ---------- */
  function buildLetters(text, containerId){
    var container = document.getElementById(containerId);
    container.innerHTML = '';
    for(var i=0;i<text.length;i++){
      var ch = text[i];
      var span = document.createElement('span');
      span.className = 'letter-span';
      span.textContent = ch === ' ' ? '\u00A0' : ch;
      span.style.animationDelay = (i*0.045) + 's';
      container.appendChild(span);
    }
  }

  /* ---------- soft celebratory tone (best effort; some phones block sound until first tap) ---------- */
  var audioCtx = null;
  function playPop(freq, duration){
    try{
      if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
      var o = audioCtx.createOscillator();
      var g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+duration);
      o.connect(g); g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime+duration+0.02);
    }catch(e){ /* silently ignore if audio isn't available */ }
  }

  /* ---------- happy birthday + balloons + fireworks scene ---------- */
  function startBdayScene(){
    buildBalloons();
    buildLetters('Happy Birthday Maheen', 'big-title');
    if(!reduceMotion){
      var w = window.innerWidth, h = window.innerHeight;
      var colors = ['#C79A2A','#E6C664','#8C2C39','#FBF6EA'];
      [0, 650, 1300, 2000, 2700].forEach(function(delay){
        setTimeout(function(){
          spawnFirework(w*(0.18+Math.random()*0.64), h*(0.16+Math.random()*0.4), colors);
          playPop(360+Math.random()*280, .32);
        }, delay);
      });
    }
    setTimeout(showModal, 2800);
  }

  function showModal(){
    modalBackdrop.hidden = false;
    modalBackdrop.style.opacity = '0';
    void modalBackdrop.offsetWidth;
    modalBackdrop.style.transition = 'opacity .5s ease';
    modalBackdrop.style.opacity = '1';
  }

  document.querySelectorAll('.btn[data-choice]').forEach(function(btn){
    btn.addEventListener('click', function(){
      modalBackdrop.style.transition = 'opacity .4s ease';
      modalBackdrop.style.opacity = '0';
      setTimeout(function(){
        modalBackdrop.hidden = true;
        crossfade(sceneBday, sceneLetter, function(){
          pageIndex = 0;
          renderPage(pageIndex);
        });
      }, 400);
    });
  });

  /* ---------- the book (letter) ---------- */
  var bookPages = [
    {
      heading: 'Happy Birthday, Bestie! \u2764\uFE0F',
      paragraphs: [
        "It feels unreal that we&rsquo;ve known each other for so many years. Time has changed so many things, yet one thing has always stayed the same, and that&rsquo;s how much I value having you in my life.",
        "Looking back at all these years, especially since we started talking regularly, I&rsquo;ve had the privilege of seeing you grow into the incredible woman you are today. You&rsquo;ve become stronger, wiser, more confident, and someone who faces life&rsquo;s challenges with courage. Watching your journey has genuinely made me proud."
      ],
      pageNum: '214'
    },
    {
      paragraphs: [
        "There is something I&rsquo;ve always wanted you to know. No matter where life takes you, what path you choose, or what dreams you decide to chase, you&rsquo;ll never have to question whether someone believes in you. I&rsquo;ll always be one of those people standing behind you, supporting you wholeheartedly. Whether the road is easy or difficult, whether everyone agrees with your choices or no one does, you&rsquo;ll always have my respect, my trust, and my support.",
        "Life has a funny way of changing people and creating distance, but some bonds are stronger than time and circumstances. Even if we don&rsquo;t talk every day or life pulls us in different directions, I&rsquo;ll always hope for your happiness. I&rsquo;ll always celebrate your victories, pray for your peace, and quietly wish for every good thing to find its way to you."
      ],
      pageNum: '215'
    },
    {
      paragraphs: [
        "You deserve a life filled with love, success, laughter, and people who appreciate your heart the way it deserves to be appreciated. And if life ever becomes overwhelming, or you simply need someone to listen, remember that you&rsquo;ll always have someone you can count on. No matter when, no matter where, I&rsquo;ll do my best to be there for you.",
        "I hope this new year of your life brings countless reasons to smile, unforgettable memories, and every blessing you&rsquo;ve been waiting for. Stay exactly the wonderful person you are.",
        "Happy Birthday once again, Maheen. Wishing you nothing but endless happiness today and always. \u2764\uFE0F"
      ],
      signoff: true,
      pageNum: '216'
    }
  ];
  var pageIndex = 0;
  var bookPageEl = document.getElementById('book-page');

  function renderPage(i){
    var data = bookPages[i];
    var html = '<p class="running-head">Chapter Twenty-Five</p>';
    if(data.heading){ html += '<h2 class="page-heading">' + data.heading + '</h2>'; }
    data.paragraphs.forEach(function(p, idx){
      var cls = 'book-para';
      if(i===0 && idx===0){ cls += ' has-dropcap'; }
      html += '<p class="'+cls+'">' + p + '</p>';
    });
    if(data.signoff){
      html += '<p class="book-signoff">From Your <span class="script">Besta</span></p>';
    }
    var navLabel = (i < bookPages.length-1) ? 'Turn the page &rarr;' : 'Continue &rarr;';
    html += '<div class="page-footer"><span class="page-num">'+data.pageNum+'</span>' +
            '<button class="page-nav" id="page-nav-btn" type="button">'+navLabel+'</button></div>';
    bookPageEl.innerHTML = html;
    document.getElementById('page-nav-btn').addEventListener('click', onPageNav);
  }

  function turnPage(cb){
    bookPageEl.classList.add('flip-out');
    setTimeout(function(){
      cb();
      bookPageEl.classList.remove('flip-out');
      bookPageEl.classList.add('flip-in');
      void bookPageEl.offsetWidth;
      bookPageEl.classList.remove('flip-in');
    }, 420);
  }

  function onPageNav(){
    if(pageIndex < bookPages.length-1){
      turnPage(function(){
        pageIndex += 1;
        renderPage(pageIndex);
      });
    } else {
      turnPage(function(){
        crossfade(sceneLetter, sceneFinal);
      });
    }
  }

  /* ---------- ambient canvas: stars + fireworks ---------- */
  var canvas = document.getElementById('fx-canvas');
  var ctx = canvas.getContext('2d');
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  var stars = [];
  for(var s=0; s<50; s++){
    stars.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height*0.65,
      r: Math.random()*1.4+.3,
      a: Math.random()*.5+.1,
      dir: Math.random()<0.5?1:-1,
      speed: 0.003+Math.random()*0.008
    });
  }
  var particles = [];
  function spawnFirework(x,y,colors){
    var count = 26;
    for(var i=0;i<count;i++){
      var angle = (Math.PI*2*i)/count + Math.random()*0.25;
      var speed = 2 + Math.random()*2.5;
      particles.push({
        x:x, y:y,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        alpha:1,
        color:colors[Math.floor(Math.random()*colors.length)],
        size:2+Math.random()*2
      });
    }
  }

  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#F8F1DF';
    stars.forEach(function(st){
      st.a += st.speed*st.dir;
      if(st.a>0.6 || st.a<0.08) st.dir *= -1;
      ctx.globalAlpha = st.a;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
      ctx.fill();
    });
    particles.forEach(function(p){
      p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.alpha -= 0.012;
    });
    particles = particles.filter(function(p){ return p.alpha>0; });
    particles.forEach(function(p){
      ctx.globalAlpha = Math.max(p.alpha,0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  if(!reduceMotion){ requestAnimationFrame(tick); }

  /* ---------- init ---------- */
  var pulseStyle = document.createElement('style');
  pulseStyle.textContent = '@keyframes pulse{0%{transform:scale(1.14)}100%{transform:scale(1)}}';
  document.head.appendChild(pulseStyle);

  startCountdown();
})();
</script>
</body>
</html>
